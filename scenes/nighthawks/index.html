<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#071516">
  <meta name="description" content="霍普《夜游者》的手机端可交互三维场景还原。">
  <title>夜游者 · Nighthawks — 名画空间</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <noscript><div class="noscript">这个互动场景需要启用 JavaScript。</div></noscript>
  <main id="app" aria-label="霍普《夜游者》的可交互三维空间研究">
    <div id="scene"></div>
    <div id="vignette"></div>
    <div id="grain"></div>
    <header class="brand" aria-hidden="true">
      <h1>夜游者</h1>
      <p>Nighthawks · spatial study</p>
    </header>
    <scene-selector current="nighthawks" manifest="../manifest.json" home="../../"></scene-selector>
    <nav class="toolbar" aria-label="场景控制">
      <button id="composition" class="primary" aria-label="回到画作构图">构图</button>
      <button id="explore" aria-pressed="false" aria-label="切换缓慢环绕">环绕</button>
      <button id="light" aria-pressed="true" aria-label="切换餐厅灯光">灯光</button>
      <button id="reset" aria-label="重置视角">复位</button>
    </nav>
    <div id="hint" class="hint">单指旋转 · 双指缩放与移动 · 双击回到构图</div>
    <div id="loading" class="loading" role="status" aria-live="polite">
      <div class="loading-inner">
        <div class="loading-title">NIGHTHAWKS</div>
        <div class="loading-line"></div>
      </div>
    </div>
  </main>
  <script type="module" src="../../shared/scene-selector.js"></script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
