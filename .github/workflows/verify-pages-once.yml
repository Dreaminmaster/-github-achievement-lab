name: Verify Pages composition once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-pages-once.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployed safe composition build
        run: |
          set -euo pipefail
          base='https://dreaminmaster.github.io/-github-achievement-lab'
          for attempt in $(seq 1 40); do
            if curl --fail --silent "$base/shared/safe-composition.js?v=b63f5d8b" | grep -q 'createSafeComposition'; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Verify all live composition returns
        run: |
          set -euo pipefail
          base='https://dreaminmaster.github.io/-github-achievement-lab'
          chrome=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          for slug in nighthawks rooms-by-the-sea last-supper the-subway; do
            output="/tmp/${slug}.html"
            timeout 80s "$chrome" \
              --headless=new \
              --no-sandbox \
              --disable-dev-shm-usage \
              --use-gl=angle \
              --use-angle=swiftshader \
              --enable-unsafe-swiftshader \
              --enable-webgl \
              --ignore-gpu-blocklist \
              --force-prefers-reduced-motion \
              --virtual-time-budget=28000 \
              --dump-dom "$base/scenes/${slug}/?verifyComposition=1&v=b63f5d8b" > "$output"
            grep -q '<canvas' "$output"
            grep -q 'class="loading done"' "$output"
            grep -q 'data-composition-ready="true"' "$output"
            if grep -q 'class="loading failed"' "$output"; then exit 1; fi
          done
