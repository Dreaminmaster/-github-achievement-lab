name: Diagnose GitHub Pages configuration

on:
  pull_request:
    paths:
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Read Pages site configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          echo "diagnostic_revision=2"
          curl --silent --show-error \
            --dump-header pages-headers.txt \
            --output pages-body.txt \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          result=$?
          echo "=== RESPONSE HEADERS ==="
          cat pages-headers.txt || true
          echo "=== RESPONSE BODY ==="
          cat pages-body.txt || true
          echo
          echo "curl_exit=${result}"
          exit 0
