name: Post-merge live scene check

on:
  push:
    paths:
      - '.github/workflows/post-merge-live-check.yml'

permissions:
  contents: write
  pages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record Pages and live browser state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          base_url="https://dreaminmaster.github.io/-github-achievement-lab/"

          for attempt in $(seq 1 18); do
            api_code=$(curl --silent --show-error \
              --output /tmp/pages.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$api_url")
            pages_status=$(jq -r '.status // "unknown"' /tmp/pages.json 2>/dev/null)
            echo "attempt=${attempt} api=${api_code} status=${pages_status}"
            if [ "$pages_status" = "built" ]; then break; fi
            sleep 10
          done

          chrome=$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)
          root_code=$(curl --silent --show-error --location --output /tmp/root.html --write-out "%{http_code}" "${base_url}?live=${GITHUB_SHA}")

          verify_scene() {
            slug="$1"
            source_code=$(curl --silent --show-error --location --output "/tmp/${slug}.source" --write-out "%{http_code}" "${base_url}scenes/${slug}/?live=${GITHUB_SHA}")
            chrome_exit=999
            canvas_count=0
            done_count=0
            failed_count=0
            error_text=""
            if [ -n "$chrome" ]; then
              timeout 60s "$chrome" \
                --headless=new \
                --no-sandbox \
                --disable-dev-shm-usage \
                --use-gl=angle \
                --use-angle=swiftshader \
                --enable-unsafe-swiftshader \
                --enable-webgl \
                --ignore-gpu-blocklist \
                --virtual-time-budget=22000 \
                --dump-dom "${base_url}scenes/${slug}/?live=${GITHUB_SHA}" \
                > "/tmp/${slug}.html" 2> "/tmp/${slug}.errors"
              chrome_exit=$?
              canvas_count=$(grep -o '<canvas' "/tmp/${slug}.html" 2>/dev/null | wc -l | tr -d ' ')
              done_count=$(grep -o 'class="loading done"' "/tmp/${slug}.html" 2>/dev/null | wc -l | tr -d ' ')
              failed_count=$(grep -o 'class="loading failed"' "/tmp/${slug}.html" 2>/dev/null | wc -l | tr -d ' ')
              error_text=$(grep -o -m1 '<p id="loading-error-message">[^<]*</p>' "/tmp/${slug}.html" 2>/dev/null || true)
            fi
            echo "${slug}_http=${source_code}"
            echo "${slug}_chrome_exit=${chrome_exit}"
            echo "${slug}_canvas=${canvas_count}"
            echo "${slug}_loading_done=${done_count}"
            echo "${slug}_loading_failed=${failed_count}"
            echo "${slug}_error=${error_text}"
          }

          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "workflow_commit=${GITHUB_SHA}"
            echo "pages_api_http=${api_code}"
            echo "pages_status=${pages_status}"
            echo "root_http=${root_code}"
            echo "root_has_rooms=$(grep -c 'rooms-by-the-sea' /tmp/root.html 2>/dev/null || true)"
            verify_scene nighthawks
            verify_scene rooms-by-the-sea
            echo "pages_response="
            cat /tmp/pages.json 2>/dev/null || true
          } > live-check-result.txt
          exit 0

      - name: Commit live verification result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-check-result.txt
          git commit -m "Record post-merge Hopper scene verification" || exit 0
          git push
