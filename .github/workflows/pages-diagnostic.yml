name: One-time GitHub Pages diagnostic

on:
  push:
    paths:
      - '.github/workflows/pages-diagnostic.yml'

permissions:
  contents: write
  pages: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify final Pages build and browser execution
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          base_url="https://dreaminmaster.github.io/-github-achievement-lab/"
          scene_url="${base_url}scenes/nighthawks/"

          for attempt in $(seq 1 18); do
            api_code=$(curl --silent --show-error \
              --output pages-api-body.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${api_url}")
            pages_status=$(jq -r '.status // "unknown"' pages-api-body.json 2>/dev/null)
            echo "attempt=${attempt} status=${pages_status}"
            if [ "${pages_status}" = "built" ]; then break; fi
            sleep 10
          done

          check_url() {
            label="$1"
            url="$2"
            code=$(curl --silent --show-error --location --output "${label}.body" --write-out "%{http_code}" "${url}")
            echo "${label}_http_code=${code}"
          }

          run_chrome() {
            mode="$1"
            shift
            timeout 50s google-chrome \
              --headless=new \
              --no-sandbox \
              --disable-dev-shm-usage \
              --enable-webgl \
              --ignore-gpu-blocklist \
              --virtual-time-budget=20000 \
              "$@" \
              --dump-dom "${scene_url}?diagnostic=${mode}" \
              > "scene-${mode}.html" 2> "chrome-${mode}.txt"
            exit_code=$?
            canvas_count=$(grep -o '<canvas' "scene-${mode}.html" 2>/dev/null | wc -l | tr -d ' ')
            loading_done_count=$(grep -o 'class="loading done"' "scene-${mode}.html" 2>/dev/null | wc -l | tr -d ' ')
            loading_failed_count=$(grep -o 'class="loading failed"' "scene-${mode}.html" 2>/dev/null | wc -l | tr -d ' ')
            error_text=$(grep -o -m1 '<p id="loading-error-message">[^<]*</p>' "scene-${mode}.html" 2>/dev/null || true)
            echo "chrome_${mode}_exit=${exit_code}"
            echo "chrome_${mode}_canvas_count=${canvas_count}"
            echo "chrome_${mode}_loading_done_count=${loading_done_count}"
            echo "chrome_${mode}_loading_failed_count=${loading_failed_count}"
            echo "chrome_${mode}_error_text=${error_text}"
            echo "chrome_${mode}_stderr_tail="
            tail -n 12 "chrome-${mode}.txt" 2>/dev/null || true
          }

          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "pages_api_http_code=${api_code}"
            echo "pages_status=${pages_status}"
            check_url root "${base_url}"
            check_url scene "${scene_url}"
            check_url local_three "${base_url}vendor/three/three.module.min.js"
            check_url local_orbit "${base_url}vendor/three/addons/controls/OrbitControls.js"
            check_url local_rect "${base_url}vendor/three/addons/lights/RectAreaLightUniformsLib.js"
            check_url scene_css "${scene_url}styles.css"
            check_url scene_app "${scene_url}src/app.js"
            check_url root_app "${base_url}src/app.js"
            check_url core "${base_url}src/core.js"
            check_url environment "${base_url}src/environment.js"
            check_url characters "${base_url}src/characters.js"
            check_url runtime "${base_url}src/runtime.js"
            check_url manifest "${base_url}scenes/manifest.json"
            check_url selector "${base_url}shared/scene-selector.js"
            echo "root_title=$(grep -o -m1 '<title>[^<]*</title>' root.body 2>/dev/null || true)"
            echo "scene_title=$(grep -o -m1 '<title>[^<]*</title>' scene.body 2>/dev/null || true)"
            echo "scene_uses_local_three=$(grep -c '../../vendor/three/three.module.min.js' scene.body 2>/dev/null || true)"
            run_chrome default
            run_chrome swiftshader --use-gl=angle --use-angle=swiftshader
          } > pages-diagnostic-result.txt

      - name: Commit diagnostic result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages-diagnostic-result.txt
          git commit -m "Record final local Three.js verification" || exit 0
          git push
