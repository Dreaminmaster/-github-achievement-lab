name: One-time GitHub Pages diagnostic

on:
  push:
    paths:
      - '.github/workflows/pages-diagnostic.yml'

permissions:
  contents: write
  pages: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Pages API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          http_code=$(curl --silent --show-error \
            --output pages-api-body.json \
            --write-out "%{http_code}" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          curl_exit=$?
          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "http_code=${http_code}"
            echo "curl_exit=${curl_exit}"
            echo "response_body="
            cat pages-api-body.json 2>/dev/null || true
          } > pages-diagnostic-result.txt

      - name: Commit diagnostic result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages-diagnostic-result.txt
          git commit -m "Record GitHub Pages API diagnostic" || exit 0
          git push
