name: One-time GitHub Pages diagnostic

on:
  push:
    paths:
      - '.github/workflows/pages-diagnostic.yml'

permissions:
  contents: write
  pages: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Pages and verify live URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          build_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds?per_page=3"

          for attempt in $(seq 1 18); do
            api_code=$(curl --silent --show-error \
              --output pages-api-body.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${api_url}")
            pages_status=$(jq -r '.status // "unknown"' pages-api-body.json 2>/dev/null)
            echo "attempt=${attempt} api_code=${api_code} pages_status=${pages_status}"
            if [ "${pages_status}" != "building" ]; then
              break
            fi
            sleep 10
          done

          html_url=$(jq -r '.html_url // "https://dreaminmaster.github.io/-github-achievement-lab/"' pages-api-body.json 2>/dev/null)
          site_code=$(curl --silent --show-error --location \
            --output live-site-body.html \
            --write-out "%{http_code}" \
            "${html_url}")
          site_title=$(grep -o -m1 '<title>[^<]*</title>' live-site-body.html 2>/dev/null || true)

          curl --silent --show-error \
            --output pages-builds.json \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${build_url}" || true

          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "pages_api_http_code=${api_code}"
            echo "pages_status=${pages_status}"
            echo "html_url=${html_url}"
            echo "live_site_http_code=${site_code}"
            echo "live_site_title=${site_title}"
            echo "pages_api_response="
            cat pages-api-body.json 2>/dev/null || true
            echo
            echo "recent_builds="
            cat pages-builds.json 2>/dev/null || true
          } > pages-diagnostic-result.txt

      - name: Commit diagnostic result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages-diagnostic-result.txt
          git commit -m "Record final GitHub Pages verification" || exit 0
          git push
