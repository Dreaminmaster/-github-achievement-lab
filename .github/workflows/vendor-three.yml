name: Vendor Three.js dependencies

on:
  push:
    paths:
      - '.github/workflows/vendor-three.yml'

permissions:
  contents: write

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download pinned Three.js r166 modules
        run: |
          set -euo pipefail
          mkdir -p vendor/three/addons/controls vendor/three/addons/lights
          curl --fail --location --retry 3 \
            https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.min.js \
            --output vendor/three/three.module.min.js
          curl --fail --location --retry 3 \
            https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/controls/OrbitControls.js \
            --output vendor/three/addons/controls/OrbitControls.js
          curl --fail --location --retry 3 \
            https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/lights/RectAreaLightUniformsLib.js \
            --output vendor/three/addons/lights/RectAreaLightUniformsLib.js
          test -s vendor/three/three.module.min.js
          test -s vendor/three/addons/controls/OrbitControls.js
          test -s vendor/three/addons/lights/RectAreaLightUniformsLib.js

      - name: Commit vendored modules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendor/three
          git commit -m "Vendor Three.js r166 for reliable scene loading" || exit 0
          git push
