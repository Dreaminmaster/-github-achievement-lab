name: Verify live Pages interaction once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-pages-interaction-once.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout final source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Wait for final Pages assets
        run: |
          set -euo pipefail
          base='https://dreaminmaster.github.io/-github-achievement-lab'
          for attempt in $(seq 1 50); do
            nighthawks=$(curl --fail --silent "$base/src/fidelity-details.js?v=83c630eb" || true)
            rooms=$(curl --fail --silent "$base/scenes/rooms-by-the-sea/src/fidelity.js?v=83c630eb" || true)
            subway=$(curl --fail --silent "$base/scenes/the-subway/src/fidelity-details.js?v=83c630eb" || true)
            if grep -q 'nighthawks-detail-layer' <<<"$nighthawks" && \
               grep -q 'west-roof-slope' <<<"$rooms" && \
               grep -q 'connected-entry-concourse' <<<"$subway"; then
              echo 'Final Pages assets are live.'
              exit 0
            fi
            sleep 10
          done
          echo 'Timed out waiting for the final Pages assets.'
          exit 1

      - name: Run real mobile interaction against live Pages
        run: |
          set -euo pipefail
          chrome=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          cp scripts/mobile-tap-stability.mjs /tmp/live-interaction.mjs
          sed -i 's#http://127.0.0.1:4173#https://dreaminmaster.github.io/-github-achievement-lab#g' /tmp/live-interaction.mjs
          node /tmp/live-interaction.mjs "$chrome"

      - name: Verify live routes and assets
        run: |
          set -euo pipefail
          base='https://dreaminmaster.github.io/-github-achievement-lab'
          for path in \
            '/' \
            '/scenes/nighthawks/' \
            '/scenes/rooms-by-the-sea/' \
            '/scenes/last-supper/' \
            '/scenes/the-subway/' \
            '/src/fidelity-details.js' \
            '/scenes/rooms-by-the-sea/src/fidelity.js' \
            '/scenes/last-supper/src/fidelity-details.js' \
            '/scenes/the-subway/src/fidelity-details.js'; do
            status=$(curl -L -sS -o /dev/null -w '%{http_code}' "$base$path?v=83c630eb")
            test "$status" = '200'
            echo "$path $status"
          done
          printf 'verified_commit=83c630eba121539f3ae2875b46d06a73523622f1\nverified_at=%s\nscenes=4\nstationary_touch=stable\ncomposition_return=stable\n' "$(date -u +%FT%TZ)" > live-verification.txt

      - name: Upload live interaction evidence
        uses: actions/upload-artifact@v4
        with:
          name: live-pages-interaction-evidence
          path: |
            /tmp/tap-stability/*
            live-verification.txt
          if-no-files-found: error
          retention-days: 7
