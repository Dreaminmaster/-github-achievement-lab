name: Validate interactive scenes

on:
  pull_request:
    paths:
      - 'index.html'
      - 'styles.css'
      - 'gallery.js'
      - 'README.md'
      - 'shared/**'
      - 'scenes/**'
      - 'src/**'
      - 'scripts/**'
      - 'vendor/**'
      - '.github/workflows/scene-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate source structure
        run: node scripts/validate.mjs

      - name: Start static server
        run: |
          python3 -m http.server 4173 > /tmp/painted-worlds-server.log 2>&1 &
          echo $! > /tmp/painted-worlds-server.pid
          for attempt in $(seq 1 20); do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/painted-worlds-server.log
          exit 1

      - name: Exercise composition return in every scene
        run: |
          set -uo pipefail
          chrome=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          failed=0
          verify_scene() {
            slug="$1"
            output="/tmp/${slug}.html"
            errors="/tmp/${slug}.errors"
            echo "--- verifying ${slug} ---"
            if ! timeout 70s "$chrome" \
              --headless=new \
              --no-sandbox \
              --disable-dev-shm-usage \
              --use-gl=angle \
              --use-angle=swiftshader \
              --enable-unsafe-swiftshader \
              --enable-webgl \
              --ignore-gpu-blocklist \
              --virtual-time-budget=26000 \
              --dump-dom "http://127.0.0.1:4173/scenes/${slug}/?ci=1&verifyComposition=1" \
              > "$output" 2> "$errors"; then
              echo "${slug}: Chrome failed"
              cat "$errors"
              failed=1
              return
            fi
            if ! grep -q '<canvas' "$output"; then
              echo "${slug}: no WebGL canvas"
              tail -n 60 "$output"
              cat "$errors"
              failed=1
            fi
            if ! grep -q 'class="loading done"' "$output"; then
              echo "${slug}: loading did not finish"
              grep -o 'class="loading[^"]*"' "$output" | tail -n 5 || true
              cat "$errors"
              failed=1
            fi
            if ! grep -q 'data-composition-ready="true"' "$output"; then
              echo "${slug}: composition return did not finish"
              grep -o 'data-composition-[^ ]*' "$output" | head -n 10 || true
              cat "$errors"
              failed=1
            fi
            if grep -q 'class="loading failed"' "$output"; then
              echo "${slug}: runtime entered failure state"
              cat "$errors"
              failed=1
            fi
          }
          verify_scene nighthawks
          verify_scene rooms-by-the-sea
          verify_scene last-supper
          verify_scene the-subway
          exit "$failed"

      - name: Capture post-click desktop and mobile composition screenshots
        run: |
          set -euo pipefail
          mkdir -p /tmp/scene-screenshots/desktop /tmp/scene-screenshots/mobile
          chrome=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          capture_scene() {
            slug="$1"
            viewport="$2"
            output="$3"
            timeout 70s "$chrome" \
              --headless=new \
              --no-sandbox \
              --disable-dev-shm-usage \
              --use-gl=angle \
              --use-angle=swiftshader \
              --enable-unsafe-swiftshader \
              --enable-webgl \
              --ignore-gpu-blocklist \
              --hide-scrollbars \
              --window-size="$viewport" \
              --virtual-time-budget=26000 \
              --screenshot="$output" \
              "http://127.0.0.1:4173/scenes/${slug}/?screenshot=1&verifyComposition=1"
            test -s "$output"
          }
          for slug in nighthawks rooms-by-the-sea last-supper the-subway; do
            capture_scene "$slug" 1440,900 "/tmp/scene-screenshots/desktop/${slug}.png"
            capture_scene "$slug" 390,844 "/tmp/scene-screenshots/mobile/${slug}.png"
          done

      - name: Upload scene screenshots
        uses: actions/upload-artifact@v4
        with:
          name: scene-composition-screenshots
          path: /tmp/scene-screenshots/**/*.png
          if-no-files-found: error
          retention-days: 7

      - name: Stop static server
        if: always()
        run: kill "$(cat /tmp/painted-worlds-server.pid)" 2>/dev/null || true
